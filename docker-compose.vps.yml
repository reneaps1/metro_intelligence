name: metro-intelligence

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - net_data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2024-01-16T16-07-38Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    volumes:
      - minio-data:/data
    networks:
      - net_data

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    networks:
      - net_app
      - net_data
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=metro_net_app"
      - "traefik.http.routers.metro-api.rule=Host(`metro.onkaizen.com.mx`) && PathPrefix(`/api`)"
      - "traefik.http.routers.metro-api.priority=100"
      - "traefik.http.routers.metro-api.entrypoints=websecure"
      - "traefik.http.routers.metro-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.metro-api.loadbalancer.server.port=8000"

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: /api/v1
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - net_app
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=metro_net_app"
      - "traefik.http.routers.metro-web.rule=Host(`metro.onkaizen.com.mx`)"
      - "traefik.http.routers.metro-web.priority=10"
      - "traefik.http.routers.metro-web.entrypoints=websecure"
      - "traefik.http.routers.metro-web.tls.certresolver=letsencrypt"
      - "traefik.http.services.metro-web.loadbalancer.server.port=8080"

networks:
  net_app:
    name: metro_net_app
    driver: bridge
  net_data:
    name: metro_net_data
    driver: bridge
    internal: true

volumes:
  pgdata:
    name: metro_pgdata
  minio-data:
    name: metro_minio_data
