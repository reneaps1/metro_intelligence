name: Deploy Metro Intelligence

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: srv1829721.hstgr.cloud
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            cd /home/rene/projects/metro_intelligence
            git fetch origin main
            git reset --hard origin/main
            echo 'VITE_API_BASE_URL=/api/v1' > frontend/.env
            docker compose -f docker-compose.vps.yml build frontend backend
            docker compose -f docker-compose.vps.yml up -d
            echo "✅ Deploy complete"
