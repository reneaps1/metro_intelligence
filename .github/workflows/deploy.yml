# Continuous deploy to the VPS. Only runs on push to `main`, which under
# branch protection is only reachable through a reviewed, green-CI PR --
# this workflow itself went through that same gate to land here (see the
# incident on 2026-07-18: a prior version of this file was pushed directly
# to main, ran as root, and its own CI/deploy run failed).
name: Deploy Metro Intelligence

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.2.1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_SSH_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 15m
          script: |
            set -e
            cd /home/rene/projects/metro_intelligence
            git fetch origin main
            git reset --hard origin/main
            docker compose -f docker-compose.vps.yml build frontend backend
            # Remove any container occupying our target names that this
            # compose project doesn't already track (e.g. left over from a
            # manual `docker run`/test outside compose) -- otherwise `up -d`
            # fails with a name conflict instead of recreating it.
            docker rm -f metro-intelligence-backend-1 metro-intelligence-frontend-1 2>/dev/null || true
            docker compose -f docker-compose.vps.yml up -d --remove-orphans
            docker image prune -f
            echo "✅ Deploy complete"
