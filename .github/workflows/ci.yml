# CI skeleton — jobs activate as backend/frontend code lands (Phases 4–5).
# Gates per docs/testing-strategy.md: lint, typecheck, tests, security scans.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no .env committed
        run: |
          if git ls-files | grep -E '(^|/)\.env($|\.)' | grep -v '.env.example'; then
            echo "::error::.env file committed"; exit 1
          fi

  # Confidentiality lint (CLAUDE.md §7/§11/§20 -- release blocker) + the seed
  # dataset's schema/statistical sanity checks (docs/tasks/F3.5.md). Only the
  # constraints/statistics tests need Postgres; the confidentiality lint runs
  # against the generators' own constants and seed/sample_files/*, so it's
  # the fast gate even before Phase 4's backend-ci exists.
  seed-validation:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: metro_seed_validation
          POSTGRES_USER: metro
          POSTGRES_PASSWORD: metro
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U metro -d metro_seed_validation"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      METRO_TEST_DATABASE_URL: postgresql+psycopg://metro:metro@localhost:5432/metro_seed_validation
      SEED_DEMO_USER_PASSWORD: ci-seed-validation-password
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install seed + backend dependencies
        run: |
          pip install -r seed/requirements.txt -r backend/requirements.txt
      - name: Run seed validation suite
        run: python -m pytest tests/seed_validation seed/tests -q

  # backend-ci: (Phase 4) ruff + mypy + pytest (with postgres service) + pip-audit
  # frontend-ci: (Phase 5) eslint + tsc + vitest + npm audit
  # container-scan: (Phase 4+) trivy on built images
